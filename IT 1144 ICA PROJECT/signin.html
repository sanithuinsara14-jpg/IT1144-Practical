<!DOCTYPE html>
<html>
<head>
    <title>BookMe - Register</title>
	<link rel="icon" type="image/x-icon" href="bookme.png">
    <link rel="stylesheet" href="style1.css">
</head>
<body class="login-body">
 
    <div class="login-container">
	 
        <div class="login-card">
		<div class="logo-3">
                    <img src="bookme.png" class="logo-icon-3" alt="Logo.">
                    <div class="logo-content">BookMe</div>
                </div>

            <h2 class="login-title">Welcome Back</h2>
            
            <form onsubmit="signinhere(event)">
    <div class="login-group">
        <label class="login-label">Email Address</label>
        <input type="email" id="login-email" class="login-input" placeholder="Enter your email" required>
    </div>
    
    <div class="login-group">
        <label class="login-label">Password</label>
        <input type="password" id="login-password" class="login-input" placeholder="Enter your password" required>
    </div>
    
    <button type="submit" class="login-btn-submit">SIGN IN</button>
    <p id="result">Submitted Details</p>
</form>


            
            <p class="login-text">New to BookMe? <a href="register.html" class="login-link">Register here</a></p>
            <a href="Home.html" class="login-back">Back to Home</a>
        </div>
    </div>
         <script src="script.js"></script>
</body>
</html>
